name: weaver_app
description: Weaver — tool-card-first multi-agent and automation platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^8.0.2

  # State management
  provider: ^6.1.5+1

  # HTTP / networking
  http: ^1.6.0
  web_socket_channel: ^3.0.3
  url_launcher: ^6.3.1

  # UI extras
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  animated_text_kit: ^4.3.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.5

  # Icons
  flutter_svg: ^2.2.4
  ionicons: ^0.2.2

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

